<div class="rp-page">
  <div class="rp-card">
    <a routerLink="/" class="rp-brand">● inkwell</a>
    <h1 class="rp-title">Reset Password</h1>

    @if (!done()) {
      <form class="rp-form" (ngSubmit)="submit()" novalidate>
        <div class="form-group">
          <label for="rp-pwd">New Password</label>
          <input id="rp-pwd" type="password" [(ngModel)]="password" name="pwd" placeholder="Min 6 characters" autocomplete="new-password" required/>
        </div>
        <div class="form-group">
          <label for="rp-confirm">Confirm Password</label>
          <input id="rp-confirm" type="password" [(ngModel)]="confirm" name="confirm" placeholder="Repeat new password" autocomplete="new-password" required/>
        </div>
        @if (error()) { <div class="form-error" role="alert">{{ error() }}</div> }
        <button type="submit" class="btn-submit" [disabled]="submitting()">{{ submitting() ? 'Resetting…' : 'Reset Password' }}</button>
      </form>
    } @else {
      <div class="rp-success">
        <div class="success-icon">✓</div>
        <p>Your password has been reset successfully.</p>
        <a routerLink="/" class="btn-home">Go to Home</a>
      </div>
    }
  </div>
</div>
